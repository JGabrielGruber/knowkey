name: knowkey

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowkey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowkey
      POSTGRES_USER: knowkey
      POSTGRES_PASSWORD: knowkey123
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowkey"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db

  redis:
    image: valkey/valkey:8.0
    container_name: knowkey-redis
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - ./redis-data:/data
    networks:
      - db

  nginx:
    image: nginx:alpine
    container_name: knowkey-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:80"
    depends_on:
      - knowkey-server
      - knowkey-mcp
    networks:
      - app
      - db

  knowkey-migration:
    build:
      context: ./server/
      dockerfile: Dockerfile
    command: python manage.py migrate --noinput
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./server/:/app
    networks:
      - app
      - db

  knowkey-server:
    build:
      context: ./server/
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - postgres
      - redis
      - knowkey-migration
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    volumes:
      - ./server/:/app
    networks:
      - app
      - db

  knowkey-mcp:
    build:
      context: ./server/
      dockerfile: Dockerfile
    command: python manage.py run_mcp_server --host 0.0.0.0 --port 8001 --transport streamable-http
    depends_on:
      - postgres
      - redis
      - knowkey-migration
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    volumes:
      - ./server/:/app
    networks:
      - app
      - db

networks:
  app:
    driver: bridge
  db:
    driver: bridge
    internal: true
