name: knowkey

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowkey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowkey
      POSTGRES_USER: knowkey
      POSTGRES_PASSWORD: knowkey123
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowkey"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8.0
    container_name: knowkey-redis
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - ./redis-data:/data
    ports:
      - "6379:6379"

  knowkey-migration:
    build:
      context: ./server/
      dockerfile: Dockerfile
    container_name: knowkey-migration
    command: python manage.py migrate --noinput
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: knowkey.settings
      POSTGRES_DB: knowkey
      POSTGRES_USER: knowkey
      POSTGRES_PASSWORD: knowkey123
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./server/:/app

  knowkey-server:
    build:
      context: ./server/
      dockerfile: Dockerfile
    container_name: knowkey-server
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - postgres
      - redis
      - knowkey-migration
    environment:
      DJANGO_SETTINGS_MODULE: knowkey.settings
      POSTGRES_DB: knowkey
      POSTGRES_USER: knowkey
      POSTGRES_PASSWORD: knowkey123
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    volumes:
      - ./server/:/app
    ports:
      - "8000:8000"

  knowkey-mcp:
    build:
      context: ./server/
      dockerfile: Dockerfile
    container_name: knowkey-mcp
    command: python manage.py run_mcp_server --host 0.0.0.0 --port 8001
    depends_on:
      - postgres
      - redis
      - knowkey-migration
    environment:
      DJANGO_SETTINGS_MODULE: knowkey.settings
      POSTGRES_DB: knowkey
      POSTGRES_USER: knowkey
      POSTGRES_PASSWORD: knowkey123
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    volumes:
      - ./server/:/app
    ports:
      - "8001:8001"

