{% extends "web/base.html" %}

{% block content %}
<!-- Top Navbar with Search -->
<div class="navbar bg-base-100/80 backdrop-blur-md border-b border-base-300 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto w-full">
        <div class="flex-1">
            <form hx-get="/nodes/" 
                  hx-trigger="keyup changed delay:400ms" 
                  hx-target="#main-content" 
                  hx-push-url="true"
                  class="max-w-xl w-full">
                <div class="join w-full">
                    <input type="text" name="q" value="{{ query|default:'' }}" 
                           placeholder="Search the knowledge base..." 
                           class="input input-bordered input-md join-item flex-1">
                    <button type="submit" class="btn btn-primary join-item">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div class="flex-none fixed">
        <a href="/" class="btn btn-ghost text-2xl font-bold">Knowkey</a>
    </div>
</div>

<div class="max-w-6xl mx-auto">
    <!-- Tabs -->
    <div class="tabs tabs-border tabs-xl" role="tablist">
        <a role="tab" href="?view=list{% if query %}&q={{ query }}{% endif %}{% if selected_node_type %}&node_type={{ selected_node_type }}{% endif %}{% if selected_tag %}&tag={{ selected_tag }}{% endif %}" 
           class="tab {% if view_mode == 'list' %}tab-active{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 me-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-list-icon lucide-layout-list"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><path d="M14 4h7"/><path d="M14 9h7"/><path d="M14 15h7"/><path d="M14 20h7"/></svg>
            List
        </a>
        <a role="tab" href="?view=graph{% if query %}&q={{ query }}{% endif %}{% if selected_node_type %}&node_type={{ selected_node_type }}{% endif %}{% if selected_tag %}&tag={{ selected_tag }}{% endif %}" 
           class="tab {% if view_mode == 'graph' %}tab-active{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-4 me-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-network-icon lucide-chart-network"><path d="m13.11 7.664 1.78 2.672"/><path d="m14.162 12.788-3.324 1.424"/><path d="m20 4-6.06 1.515"/><path d="M3 3v16a2 2 0 0 0 2 2h16"/><circle cx="12" cy="6" r="2"/><circle cx="16" cy="12" r="2"/><circle cx="9" cy="15" r="2"/></svg>
            Graph
        </a>
    </div>

    <div class="divider -mt-2 mb-5"></div>

    <div id="main-content">
        {% if view_mode == "graph" %}
            {% include "web/nodes/partial_graph.html" %}
        {% else %}
            {% include "web/nodes/partial_list.html" %}
        {% endif %}
    </div>
</div>
{% endblock %}
